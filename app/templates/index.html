<!DOCTYPE html>
<html>
<head>
    <title>Flask App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .btn-custom {
            width: 180px;
            margin: 10px;
        }
    </style>
</head>

<body>

<div class="card-custom">

    <h1 class="mb-4">🚀 Flask Python App</h1>
    <p class="mb-4">A modern DevOps-powered web application</p>

    <a href="/users" class="btn btn-primary btn-lg btn-custom">View Users</a>
    <a href="/add" class="btn btn-success btn-lg btn-custom">Add User</a>

</div>

</body>
</html>
